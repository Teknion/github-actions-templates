name: OpenEdge Build Template (Release)

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      deployment_config_dv:
        required: true
        type: string
      deployment_config_qa:
        required: true
        type: string
      deployment_config_ut:
        required: true
        type: string
      deployment_config_pd:
        required: true
        type: string
    secrets:
      GIT_ACCESS_TOKEN:
        required: true
      NEXUS_PASSWORD:
        required: true

env:
  cwd_main: "build"
  DLC: ${{ vars.DLC }}
  APP_NAME: ${{ vars.DEPLOY_CONFIG_BASENAME }}
  ARTIFACT_FILENAME: ${{ vars.DEPLOY_CONFIG_BASENAME }}.pl
  PF_CONFIG_FILENAME: ${{ vars.PF_FILENAME }}

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    defaults:
      run:
        working-directory: build

    outputs:
      release_version: ${{ steps.set_version.outputs.release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: build

      - name: Determine Release Version
        id: set_version
        run: |
          LATEST_TAG=$(git tag --list "v*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi

          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))
          RELEASE_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          repository: Teknion/commonLIB
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          path: commonLIB

      - name: Prepare
        run: |
          chmod +x gradlew
          cp -r ${{ github.workspace }}/commonLIB/* ${{ github.workspace }}/build/

      - name: Build with Gradle
        run: |
          export RELEASE_VERSION=${{ steps.set_version.outputs.release_version }}
          ./gradlew -PDLC=${{ env.DLC }} -PappName=${{ env.APP_NAME }} -b build.gradle

      - name: Upload PL to Nexus Release Repo
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          NEXUS_BASE="http://${{ vars.NEXUS_HOST }}:${{ vars.NEXUS_PORT }}"
          NEXUS_PATH="repository/${{ vars.NEXUS_OPENEDGE_REPO_RELEASE }}/${REPO_NAME}/${{ steps.set_version.outputs.release_version }}"
          NEXUS_URL="$NEXUS_BASE/$NEXUS_PATH"

          curl --fail -u "${{ vars.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            -XPUT -T build/dist/*.pl \
            $NEXUS_URL/

  generate_pf_files:
    needs: build
    runs-on: ${{ inputs.runner }}

    strategy:
      matrix:
        environment: [DV, QA, UT, PD]

    defaults:
      run:
        working-directory: build

    steps:
      - uses: actions/checkout@v4
        with:
          path: build

      - name: Resolve Deployment Config
        run: |
          echo "Environment: ${{ matrix.environment }}"

          case "${{ matrix.environment }}" in
            DV)
              VALUE="${{ inputs.deployment_config_dv }}"
              ;;
            QA)
              VALUE="${{ inputs.deployment_config_qa }}"
              ;;
            UT)
              VALUE="${{ inputs.deployment_config_ut }}"
              ;;
            PD)
              VALUE="${{ inputs.deployment_config_pd }}"
              ;;
          esac

          # Fallback to file if input empty
          if [ -z "$VALUE" ]; then
            CONFIG_FILE="config/${{ matrix.environment }}.pf"

            echo "No input provided. Using file: $CONFIG_FILE"

            if [ ! -f "$CONFIG_FILE" ]; then
              echo "❌ Missing config file: $CONFIG_FILE"
              exit 1
            fi

            VALUE=$(cat "$CONFIG_FILE")
          else
            echo "Using config from input"
          fi

          # Multiline export
          echo "DEPLOYMENT_CONFIG<<EOF" >> $GITHUB_ENV
          echo "$VALUE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate PF File
        run: |
          mkdir -p build/dist/${{ matrix.environment }}
          echo "${DEPLOYMENT_CONFIG}" > build/dist/${{ matrix.environment }}/${{ vars.PF_FILENAME }}

      - name: Upload PF to Nexus Release Repo
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          NEXUS_BASE="http://${{ vars.NEXUS_HOST }}:${{ vars.NEXUS_PORT }}"
          NEXUS_PATH="repository/${{ vars.NEXUS_OPENEDGE_REPO_RELEASE }}/${REPO_NAME}/${{ needs.build.outputs.release_version }}/${{ matrix.environment }}"
          NEXUS_URL="$NEXUS_BASE/$NEXUS_PATH"

          curl --fail -u "${{ vars.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            -XPUT -T build/dist/${{ matrix.environment }}/${{ vars.PF_FILENAME }} \
            $NEXUS_URL/${{ vars.PF_FILENAME }}

  tag_release:
    needs: build
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Immutable Git Tag
        run: |
          VERSION=${{ needs.build.outputs.release_version }}

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Fail if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag already exists: $VERSION"
            exit 1
          fi

          git tag $VERSION
          git push origin $VERSION