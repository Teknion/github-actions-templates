name: OpenEdge Build Template

on:
  workflow_call:
    inputs:
      repo_path:
        required: true
        type: string
      runner:
        required: true
        type: string
    secrets:
      GIT_ACCESS_TOKEN:
        required: true
      NEXUS_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    defaults:
      run:
        working-directory: build

    outputs:
      snapshot_version: ${{ steps.set_version.outputs.snapshot_version }}

    steps:
      # Checkout repo (with tags)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: build

      # Determine version
      - name: Determine Version
        id: set_version
        run: |
          LATEST_TAG=$(git tag --list "[vV]*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.2.0"
          fi

          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))
          SNAPSHOT_VERSION="v${MAJOR}.${MINOR}.${PATCH}-SNAPSHOT"

          echo "snapshot_version=$SNAPSHOT_VERSION" >> $GITHUB_OUTPUT

      # Checkout shared lib
      - uses: actions/checkout@v4
        with:
          repository: Teknion/commonLIB
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          path: commonLIB

      # Prepare build
      - name: Prepare
        run: |
          ls -ltrh 
          pwd 
          chmod +x gradlew
          cp -r ${{ github.workspace }}/commonLIB/* ${{ github.workspace }}/build/

      # Build
      - name: Build with Gradle
        run: |
          cd ${{ inputs.repo_path }}
          export SNAPSHOT_VERSION=${{ steps.set_version.outputs.snapshot_version }}
          ./gradlew -b build.gradle

      # Upload PL file
      - name: Upload PL to Nexus
        run: |
          cd ${{ inputs.repo_path }}

          REPO_NAME="${{ github.event.repository.name }}"

          NEXUS_BASE="http://${{ vars.NEXUS_HOST }}:${{ vars.NEXUS_PORT }}"
          NEXUS_PATH="repository/${{ vars.NEXUS_REPO }}/${REPO_NAME}/${{ steps.set_version.outputs.snapshot_version }}"
          NEXUS_URL="$NEXUS_BASE/$NEXUS_PATH"

          curl --fail -u "${{ vars.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            -XPUT -T build/dist/*.pl \
            $NEXUS_URL/

  generate_pf_files:
    needs: build
    runs-on: ${{ inputs.runner }}

    strategy:
      matrix:
        environment: [DV, QA, UT, PD]

    defaults:
      run:
        working-directory: build

    steps:
      - uses: actions/checkout@v4
        with:
          path: build

      - name: Generate PF file
        run: |
          mkdir -p build/dist/${{ matrix.environment }}
          echo "${{ vars.DEPLOYMENT_CONFIG }}" > build/dist/${{ matrix.environment }}/${{ vars.PF_FILENAME }}

      - name: Upload PF to Nexus
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          NEXUS_BASE="http://${{ vars.NEXUS_HOST }}:${{ vars.NEXUS_PORT }}"
          NEXUS_PATH="repository/${{ vars.NEXUS_REPO }}/${REPO_NAME}/${{ needs.build.outputs.snapshot_version }}/${{ matrix.environment }}"
          NEXUS_URL="$NEXUS_BASE/$NEXUS_PATH"

          curl --fail -u "${{ vars.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            -XPUT -T build/dist/${{ matrix.environment }}/${{ vars.PF_FILENAME }} \
            $NEXUS_URL/${{ vars.PF_FILENAME }}

  tag_release:
    needs: build
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        run: |
          VERSION=${{ needs.build.outputs.snapshot_version }}
          CLEAN_VERSION=${VERSION%-SNAPSHOT}

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag $CLEAN_VERSION || echo "Tag exists"
          git push origin $CLEAN_VERSION || echo "Push skipped"
