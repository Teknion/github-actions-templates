name: OpenEdge Build Template

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      deployment_config_dv:
        required: true
        type: string
      deployment_config_qa:
        required: true
        type: string
      deployment_config_ut:
        required: true
        type: string
      deployment_config_pd:
        required: true
        type: string
    secrets:
      GIT_ACCESS_TOKEN:
        required: true
      NEXUS_PASSWORD:
        required: true

env:
  cwd_main: "build"
  DLC: ${{ vars.DLC }}
  APP_NAME: ${{ vars.DEPLOY_CONFIG_BASENAME }}
  ARTIFACT_FILENAME: ${{ vars.DEPLOY_CONFIG_BASENAME }}.pl
  PF_CONFIG_FILENAME: ${{ vars.PF_FILENAME }}

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    defaults:
      run:
        working-directory: build

    outputs:
      snapshot_version: ${{ steps.set_version.outputs.snapshot_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: build

      - name: Determine Version
        id: set_version
        run: |
          LATEST_TAG=$(git tag --list "[vV]*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.2.0"
          fi

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))
          SNAPSHOT_VERSION="${MAJOR}.${MINOR}.${PATCH}-SNAPSHOT"

          echo "snapshot_version=$SNAPSHOT_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          repository: Teknion/commonLIB
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          path: commonLIB

      - name: Prepare
        run: |
          chmod +x gradlew
          cp -r ${{ github.workspace }}/commonLIB/* ${{ github.workspace }}/build/

      - name: Build with Gradle
        run: |
          export SNAPSHOT_VERSION=${{ steps.set_version.outputs.snapshot_version }}
          ./gradlew -PDLC=${{ env.DLC }} -PappName=${{ env.APP_NAME }} -b build.gradle

      - name: Upload PL to Nexus
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          NEXUS_BASE="http://${{ vars.NEXUS_HOST }}:${{ vars.NEXUS_PORT }}"
          NEXUS_PATH="repository/${{ vars.NEXUS_OPENEDGE_REPO_SNAPSHOT }}/${REPO_NAME}/${{ steps.set_version.outputs.snapshot_version }}"
          NEXUS_URL="$NEXUS_BASE/$NEXUS_PATH"

          curl --fail -u "${{ vars.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            -XPUT -T build/dist/*.pl \
            $NEXUS_URL/

  generate_pf_files:
    needs: build
    runs-on: ${{ inputs.runner }}

    strategy:
      matrix:
        environment: [DV, QA, UT, PD]

    defaults:
      run:
        working-directory: build

    steps:
      - uses: actions/checkout@v4
        with:
          path: build

      # ✅ FIX: Set environment-specific config
      - name: Set deployment config per environment
        run: |
          case "${{ matrix.environment }}" in
            DV)
              echo "DEPLOYMENT_CONFIG=${{ inputs.deployment_config_dv }}" >> $GITHUB_ENV
              ;;
            QA)
              echo "DEPLOYMENT_CONFIG=${{ inputs.deployment_config_qa }}" >> $GITHUB_ENV
              ;;
            UT)
              echo "DEPLOYMENT_CONFIG=${{ inputs.deployment_config_ut }}" >> $GITHUB_ENV
              ;;
            PD)
              echo "DEPLOYMENT_CONFIG=${{ inputs.deployment_config_pd }}" >> $GITHUB_ENV
              ;;
          esac

      - name: Generate PF file
        run: |
          mkdir -p build/dist/${{ matrix.environment }}
          echo "${DEPLOYMENT_CONFIG}" > build/dist/${{ matrix.environment }}/${{ vars.PF_FILENAME }}

      - name: Upload PF to Nexus
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          NEXUS_BASE="http://${{ vars.NEXUS_HOST }}:${{ vars.NEXUS_PORT }}"
          NEXUS_PATH="repository/${{ vars.NEXUS_OPENEDGE_REPO_SNAPSHOT }}/${REPO_NAME}/${{ needs.build.outputs.snapshot_version }}/${{ matrix.environment }}"
          NEXUS_URL="$NEXUS_BASE/$NEXUS_PATH"

          curl --fail -u "${{ vars.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            -XPUT -T build/dist/${{ matrix.environment }}/${{ vars.PF_FILENAME }} \
            $NEXUS_URL/${{ vars.PF_FILENAME }}
